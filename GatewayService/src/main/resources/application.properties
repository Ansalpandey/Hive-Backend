spring.application.name=GatewayService
server.port=8000
spring.cloud.consul.discovery.hostname=
spring.cloud.consul.discovery.ip-address=192.168.1.3
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.service-name=${spring.application.name}
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=2s
# --- Actuator & Logging ---
management.endpoints.web.exposure.include=health,info,metrics
logging.level.org.springframework.cloud.consul=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
# --- Spring Cloud Gateway Routes ---
spring.cloud.gateway.server.webflux.default-filters=PreserveHostHeader
spring.cloud.gateway.server.webflux.enabled=true
# Auth Service
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
# IMPORTANT: The URI must match the exact service-name registered in Consul by your auth backend
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AuthService
# Notice the syntax here: predicates[0]=Path=...
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
# Post Service
spring.cloud.gateway.server.webflux.routes[1].id=post-service
# IMPORTANT: The URI must match the exact service-name registered in Consul by your auth backend
spring.cloud.gateway.server.webflux.routes[1].uri=lb://PostService
# Notice the syntax here: predicates[0]=Path=...
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/posts/**
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET, POST, PUT, DELETE, OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowCredentials=true